[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  external_node_modules = ["@anthropic-ai/sdk"]
  node_bundler = "esbuild"

[functions."teach-plan"]
  timeout = 26


[[redirects]]
  from = "/api/catalog"
  to = "/.netlify/functions/catalog"
  status = 200

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/teach-plan"
  to = "/.netlify/functions/teach-plan"
  status = 200

[[redirects]]
  from = "/api/esv-passages"
  to = "/.netlify/functions/esv-passages"
  status = 200

[[redirects]]
  from = "/api/key"
  to = "/.netlify/functions/api-key"
  status = 200
